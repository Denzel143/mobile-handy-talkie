<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Walkie-Talkie Cloudflare</title>
    <style>
        :root { --bg: #121212; --text: #ffffff; --primary: #007bff; --success: #28a745; --danger: #dc3545; --warning: #ffc107; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .container { background: #1e1e1e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 320px; min-height: 400px; display: flex; flex-direction: column; justify-content: center; }
        .view { display: none; flex-direction: column; gap: 15px; }
        .active { display: flex; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #555; background: #333; color: white; font-size: 16px; text-align: center; }
        button { padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; color: white; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .btn-primary { background: var(--primary); }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }
        .btn-ptt { background: var(--warning); color: #000; height: 100px; font-size: 20px; border-radius: 50%; margin: 20px 0; touch-action: manipulation; }
        .btn-ptt:active { background: #e0a800; }
        .device-item { background: #2d2d2d; padding: 15px; border-radius: 8px; cursor: pointer; margin-bottom: 10px; border: 1px solid #444; }
        .device-item:hover { background: #3d3d3d; }
        .loader { border: 4px solid #333; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<div class="container">
    <div id="view-sync" class="view active">
        <h2>Mencari Server</h2>
        <div class="loader"></div>
        <p style="font-size: 13px; color: #aaa;" id="sync-status">Menunggu data dari Firebase...</p>
    </div>

    <div id="view-setup" class="view">
        <h2>Identitas Baru</h2>
        <input type="text" id="username-input" placeholder="Masukkan Username Anda">
        <button class="btn-primary" onclick="saveIdentity()">Simpan & Masuk</button>
    </div>

    <div id="view-lobby" class="view">
        <h2>Halo, <span id="display-name"></span></h2>
        <p style="font-size: 12px; color: #888;">ID: <span id="display-id"></span></p>
        <button class="btn-primary" onclick="requestUserList()">Cari Perangkat Online</button>
    </div>

    <div id="view-scanning" class="view">
        <h2>Perangkat Ditemukan</h2>
        <div id="device-list" style="max-height: 250px; overflow-y: auto;">
            <p>Memindai...</p>
        </div>
        <button class="btn-danger" onclick="switchView('view-lobby')">Kembali</button>
    </div>

    <div id="view-incoming" class="view">
        <h2 style="color: var(--warning)">Panggilan Masuk</h2>
        <p id="caller-name" style="font-size: 18px; font-weight: bold;"></p>
        <p id="caller-id" style="font-size: 12px; color: #888;"></p>
        <button class="btn-success" onclick="acceptCall()">Terima</button>
        <button class="btn-danger" onclick="rejectCall()">Tolak</button>
    </div>

    <div id="view-active" class="view">
        <h2 style="color: var(--success)">Terhubung</h2>
        <button id="btn-ptt" class="btn-ptt" onmousedown="startTalk()" onmouseup="stopTalk()" ontouchstart="startTalk()" ontouchend="stopTalk()">Tahan<br>Bicara</button>
        <p id="talk-status">Mikrofon Mati</p>
        <button class="btn-danger" onclick="disconnectCall()">Disconnect</button>
    </div>
</div>

<audio id="remote-audio" autoplay></audio>

<script>
    // --- KONFIGURASI FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyDJr-6PSzrDEC7J9XfI38g3C_r65x9OlLA",
        authDomain: "public-database-e58ab.firebaseapp.com",
        databaseURL: "https://public-database-e58ab-default-rtdb.firebaseio.com",
        projectId: "public-database-e58ab",
        storageBucket: "public-database-e58ab.firebasestorage.app",
        messagingSenderId: "595860953738",
        appId: "1:595860953738:web:d0ad19f96351191137ab73",
};

    // Inisialisasi Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let socket = null;
    let myUser = { username: '', id: '' };
    let currentPeerSocketId = null;
    let incomingCallerSocketId = null;
    
    // Variabel WebRTC
    let localStream = null;
    let peerConnection = null;
    const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
    const audioConstraints = { audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } };

    function switchView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
    }

    // --- LISTENER FIREBASE (PUSH NOTIFICATION) ---
    // Akan tertrigger otomatis saat web dibuka ATAU ketika server Node.js update URL di database
    database.ref('server/tunnel_url').on('value', (snapshot) => {
        const url = snapshot.val();
        const syncStatus = document.getElementById('sync-status');
        
        if (url && url !== "") {
            syncStatus.innerText = "URL Server ditemukan. Menghubungkan...";
            connectToServer(url);
        } else {
            syncStatus.innerText = "Server sedang offline/restart. Menunggu URL...";
            if (socket) socket.disconnect(); // Putuskan jika URL ditarik (kosong)
            switchView('view-sync');
        }
    });

    // --- KONEKSI KE SERVER VIA SOCKET.IO ---
    function connectToServer(url) {
        if (socket) socket.disconnect(); // Reset jika pindah URL (IP ganti)

        socket = io(url);

        socket.on('connect', () => {
            setupSocketListeners();
            initAuth();
        });

        socket.on('connect_error', (err) => {
            document.getElementById('sync-status').innerText = "Gagal terhubung ke Socket. Menunggu server...";
            switchView('view-sync');
        });
    }

    function setupSocketListeners() {
        socket.on('online_users', (users) => {
            const listDiv = document.getElementById('device-list');
            listDiv.innerHTML = '';
            if (users.length === 0) { listDiv.innerHTML = '<p>Tidak ada perangkat online.</p>'; return; }
            users.forEach(u => {
                const div = document.createElement('div');
                div.className = 'device-item';
                div.innerHTML = `<strong>${u.username}</strong><br><span style="font-size:11px; color:#aaa">${u.id}</span>`;
                div.onclick = () => initiateCall(u.id, u.username);
                listDiv.appendChild(div);
            });
        });

        socket.on('call_busy', (msg) => { alert(msg); switchView('view-lobby'); });
        socket.on('call_failed', (msg) => { alert(msg); switchView('view-lobby'); });
        socket.on('call_rejected', () => { alert("Panggilan Anda ditolak."); switchView('view-lobby'); });

        socket.on('incoming_call', (data) => {
            incomingCallerSocketId = data.callerSocketId;
            document.getElementById('caller-name').innerText = data.callerUsername;
            document.getElementById('caller-id').innerText = data.callerId;
            switchView('view-incoming');
        });

        socket.on('call_accepted', async (data) => {
            currentPeerSocketId = data.targetSocketId;
            await setupWebRTC();
            switchView('view-active');
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('webrtc_offer', { targetSocketId: currentPeerSocketId, offer: offer });
        });

        socket.on('webrtc_offer', async (data) => {
            if (!peerConnection) return;
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('webrtc_answer', { targetSocketId: data.senderSocketId, answer: answer });
        });

        socket.on('webrtc_answer', async (data) => { if (peerConnection) await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer)); });
        socket.on('webrtc_ice', async (data) => { if (peerConnection) await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate)); });

        socket.on('call_ended', () => {
            playDisconnectSound();
            alert("Panggilan diputus oleh perangkat lawan.");
            cleanupCall();
            switchView('view-lobby');
        });
    }

    function initAuth() {
        const storedUser = localStorage.getItem('wt_username');
        const storedId = localStorage.getItem('wt_id');
        if (storedUser && storedId) {
            myUser.username = storedUser; myUser.id = storedId;
            document.getElementById('display-name').innerText = myUser.username;
            document.getElementById('display-id').innerText = myUser.id;
            socket.emit('register', myUser);
            switchView('view-lobby');
        } else {
            switchView('view-setup');
        }
    }

    function saveIdentity() {
        const name = document.getElementById('username-input').value.trim();
        if (!name) return alert("Username tidak boleh kosong!");
        const randomId = Array.from({length: 20}, () => Math.floor(Math.random() * 10)).join('');
        localStorage.setItem('wt_username', name); localStorage.setItem('wt_id', randomId);
        initAuth();
    }

    function requestUserList() { switchView('view-scanning'); socket.emit('get_users'); }
    function initiateCall(targetId, targetName) { alert(`Meminta koneksi ke ${targetName}...`); socket.emit('call_request', targetId); }
    async function acceptCall() { socket.emit('call_accept', incomingCallerSocketId); currentPeerSocketId = incomingCallerSocketId; await setupWebRTC(); switchView('view-active'); }
    function rejectCall() { socket.emit('call_reject', incomingCallerSocketId); switchView('view-lobby'); }

    async function setupWebRTC() {
        localStream = await navigator.mediaDevices.getUserMedia(audioConstraints);
        localStream.getAudioTracks().forEach(t => t.enabled = false); 
        peerConnection = new RTCPeerConnection(rtcConfig);
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        peerConnection.ontrack = (event) => { document.getElementById('remote-audio').srcObject = event.streams[0]; };
        peerConnection.onicecandidate = (event) => { if (event.candidate) socket.emit('webrtc_ice', { targetSocketId: currentPeerSocketId, candidate: event.candidate }); };
    }

    function startTalk() {
        if(localStream) {
            localStream.getAudioTracks().forEach(track => track.enabled = true);
            document.getElementById('talk-status').innerText = "🔊 Sedang Berbicara...";
            document.getElementById('btn-ptt').style.background = "#dc3545";
        }
    }

    function stopTalk() {
        if(localStream) {
            localStream.getAudioTracks().forEach(track => track.enabled = false);
            document.getElementById('talk-status').innerText = "Mikrofon Mati";
            document.getElementById('btn-ptt').style.background = "var(--warning)";
        }
    }

    function disconnectCall() { socket.emit('end_call'); cleanupCall(); switchView('view-lobby'); }

    function cleanupCall() {
        if(peerConnection) { peerConnection.close(); peerConnection = null; }
        if(localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
        document.getElementById('remote-audio').srcObject = null;
        currentPeerSocketId = null;
    }

    function playDisconnectSound() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(400, audioCtx.currentTime); 
        oscillator.frequency.setValueAtTime(300, audioCtx.currentTime + 0.2); 
        gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
        oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
        oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.5);
    }
</script>

</body>
</html>
